name: Update Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to sync (without v prefix, e.g. 0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Download release binaries and compute checksums
        run: |
          VERSION=${{ github.event.inputs.version }}
          BASE_URL="https://github.com/seanhalberthal/lazycron/releases/download/v${VERSION}"
          mkdir -p binaries

          for PLATFORM in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            curl -sL "${BASE_URL}/lazycron-${PLATFORM}" -o "binaries/lazycron-${PLATFORM}"
            sha256sum "binaries/lazycron-${PLATFORM}" | awk '{print $1}' > "binaries/${PLATFORM}.sha256"
          done

      - name: Generate formula
        run: |
          VERSION=${{ github.event.inputs.version }}
          DARWIN_AMD64_SHA=$(cat binaries/darwin-amd64.sha256)
          DARWIN_ARM64_SHA=$(cat binaries/darwin-arm64.sha256)
          LINUX_AMD64_SHA=$(cat binaries/linux-amd64.sha256)
          LINUX_ARM64_SHA=$(cat binaries/linux-arm64.sha256)

          cat > lazycron.rb << FORMULA
          class Lazycron < Formula
            desc "Lightweight TUI for managing cron jobs — lazygit-style"
            homepage "https://github.com/seanhalberthal/lazycron"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/seanhalberthal/lazycron/releases/download/v${VERSION}/lazycron-darwin-arm64"
                sha256 "${DARWIN_ARM64_SHA}"
                def install
                  bin.install "lazycron-darwin-arm64" => "lazycron"
                end
              end
              on_intel do
                url "https://github.com/seanhalberthal/lazycron/releases/download/v${VERSION}/lazycron-darwin-amd64"
                sha256 "${DARWIN_AMD64_SHA}"
                def install
                  bin.install "lazycron-darwin-amd64" => "lazycron"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/seanhalberthal/lazycron/releases/download/v${VERSION}/lazycron-linux-arm64"
                sha256 "${LINUX_ARM64_SHA}"
                def install
                  bin.install "lazycron-linux-arm64" => "lazycron"
                end
              end
              on_intel do
                url "https://github.com/seanhalberthal/lazycron/releases/download/v${VERSION}/lazycron-linux-amd64"
                sha256 "${LINUX_AMD64_SHA}"
                def install
                  bin.install "lazycron-linux-amd64" => "lazycron"
                end
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/lazycron --version 2>&1", 0)
            end
          end
          FORMULA

      - name: Push formula to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: lazycron.rb
          destination_repo: seanhalberthal/homebrew-tap
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update lazycron to v${{ github.event.inputs.version }}"
