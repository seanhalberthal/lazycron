name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for CI skip
        id: skip
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Lint
        if: steps.skip.outputs.skip != 'true'
        run: make lint

      - name: Test
        if: steps.skip.outputs.skip != 'true'
        run: make test

      - name: Determine version bump
        if: steps.skip.outputs.skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${CURRENT_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if echo "$COMMIT_MSG" | grep -qiE '^(breaking|BREAKING CHANGE):'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MSG" | grep -qiE '^(feat|add|update):'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif echo "$COMMIT_MSG" | grep -qiE '^fix:'; then
            PATCH=$((PATCH + 1))
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    needs: build
    if: needs.build.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cross-compile
        run: |
          VERSION=${{ needs.build.outputs.new_version }}
          LDFLAGS="-s -w -X github.com/bssmnt/lazycron/internal/types.Version=${VERSION}"
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/lazycron-linux-amd64 ./cmd/lazycron
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/lazycron-linux-arm64 ./cmd/lazycron
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/lazycron-darwin-amd64 ./cmd/lazycron
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/lazycron-darwin-arm64 ./cmd/lazycron

      - name: Create tag
        run: |
          VERSION=${{ needs.build.outputs.new_version }}
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: v${{ needs.build.outputs.new_version }}
          generate_release_notes: true
          files: dist/*

      - name: Trigger Homebrew update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: seanhalberthal/homebrew-tap
          event-type: update-formula
          client-payload: '{"version": "${{ needs.build.outputs.new_version }}", "repo": "bssmnt/lazycron"}'

  # Consolidation job for branch protection
  ci:
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Check build result
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            exit 1
          fi
